<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC26 Sweep · Design 1 · Stadium Dark</title>
<style>
  :root{
    --bg:#0a0e1a; --panel:#121829; --panel2:#1a2138; --line:#28304a;
    --lime:#c6ff3a; --lime2:#9be800; --txt:#eef2ff; --mut:#8b96b8; --red:#ff5d6c; --green:#34e0a1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:
      radial-gradient(1200px 600px at 50% -10%, #16203c 0%, transparent 60%),
      var(--bg);color:var(--txt);min-height:100vh}
  .wrap{max-width:1240px;margin:0 auto;padding:28px 22px 80px}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:8px}
  .brand{display:flex;align-items:center;gap:14px}
  .ball{width:50px;height:50px;border-radius:50%;background:
      radial-gradient(circle at 35% 30%,#fff 0 18%,#0a0e1a 19% 22%,#fff 23%);
      box-shadow:0 0 30px rgba(198,255,58,.35);border:2px solid var(--lime)}
  h1{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1}
  .sub{color:var(--mut);font-size:13px;margin-top:4px}
  .demo{background:rgba(255,93,108,.14);color:var(--red);border:1px solid rgba(255,93,108,.4);
      padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.4px}
  .stat{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
      border-radius:14px;padding:12px 20px;text-align:center}
  .stat b{display:block;font-size:26px;color:var(--lime)}
  .stat span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:1px}
  .grid{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;margin-top:26px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
      border-radius:18px;padding:20px}
  .card h2{font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin-bottom:16px;
      display:flex;align-items:center;gap:8px}
  .card h2::before{content:"";width:4px;height:16px;background:var(--lime);border-radius:2px}
  /* podium */
  .podium{display:flex;gap:12px;align-items:flex-end;margin-bottom:18px}
  .pod{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center;position:relative}
  .pod.p1{border-color:var(--lime);box-shadow:0 0 24px rgba(198,255,58,.18);padding-top:26px}
  .pod .medal{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:30px;height:30px;border-radius:50%;
      display:grid;place-items:center;font-weight:800;font-size:14px;color:#0a0e1a}
  .pod.p1 .medal{background:linear-gradient(180deg,#ffe27a,#f5b301)}
  .pod.p2 .medal{background:linear-gradient(180deg,#e8eefc,#aab4cf)}
  .pod.p3 .medal{background:linear-gradient(180deg,#e6a978,#c47a3d)}
  .pod .nm{font-weight:800;font-size:16px;margin:6px 0 2px}
  .pod .st{font-size:11px;color:var(--lime);font-weight:700}
  .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;
      box-shadow:0 0 0 0 rgba(52,224,161,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,224,161,.6)}70%{box-shadow:0 0 0 8px rgba(52,224,161,0)}}
  /* leaderboard rows */
  .row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;margin-bottom:6px;
      background:rgba(255,255,255,.02);border:1px solid transparent}
  .row.in{border-color:rgba(52,224,161,.35);background:rgba(52,224,161,.06)}
  .row.out{opacity:.5}
  .row .rk{width:22px;text-align:center;color:var(--mut);font-weight:700;font-size:13px}
  .row .who{flex:1;min-width:0}
  .row .who b{font-size:15px}
  .row .who .teams{font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .b-in{background:var(--lime);color:#0a0e1a}
  .b-out{background:rgba(255,255,255,.07);color:var(--mut)}
  .crest{vertical-align:middle;border-radius:3px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  /* player team chips */
  .pcard{padding:14px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid var(--line);margin-bottom:10px}
  .pcard .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .pcard .ph b{font-size:15px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:flex;align-items:center;gap:7px;padding:6px 11px 6px 7px;border-radius:999px;font-size:13px;font-weight:600;
      background:var(--panel2);border:1px solid var(--line)}
  .chip.alive{border-color:var(--green);background:rgba(52,224,161,.1)}
  .chip.dead{opacity:.45;text-decoration:line-through}
  .chip small{font-size:10px;color:var(--mut);font-weight:600}
  /* results */
  .res{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .res:last-child{border:0}
  .res .stg{width:96px;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;flex:none}
  .res .tm{flex:1;display:flex;align-items:center;gap:7px;font-size:14px}
  .res .tm.r{justify-content:flex-end;text-align:right}
  .res .sc{font-weight:800;font-size:16px;background:var(--panel2);border:1px solid var(--line);padding:3px 10px;border-radius:8px;min-width:54px;text-align:center}
  .flags{margin-top:22px;font-size:12px;color:var(--mut)}
  .flags b{color:var(--red)}
  section{margin-top:22px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="ball"></div>
      <div>
        <h1 id="title"></h1>
        <div class="sub" id="sub"></div>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="demo">DEMO DATA</span>
      <div class="stat"><b id="pin"></b><span>Still in</span></div>
      <div class="stat"><b id="ptot"></b><span>Players</span></div>
    </div>
  </header>

  <div class="grid">
    <div>
      <div class="card">
        <h2>Leaderboard — who's doing well</h2>
        <div class="podium" id="podium"></div>
        <div id="board"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <h2><span class="live-dot"></span>Recent results</h2>
        <div id="recent"></div>
      </div>
      <div class="card" style="margin-top:22px">
        <h2>Still to play</h2>
        <div id="fixtures"></div>
      </div>
    </div>
  </div>

  <section class="card">
    <h2>Every player &amp; their teams</h2>
    <div id="players" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px"></div>
  </section>

  <div class="flags card" id="flags"></div>
</div>

<script src="data.js"></script>
<script>
const D=window.DATA;
const crest=(t,s=18)=>t.crest?`<img class="crest" src="${t.crest}" width="${s}" height="${s}" onerror="this.style.display='none'"> `:'';
document.getElementById('title').textContent=D.title;
document.getElementById('sub').textContent='Last team standing · '+D.phase+' · updated '+new Date(D.updated).toLocaleString();
document.getElementById('pin').textContent=D.playersIn;
document.getElementById('ptot').textContent=D.playersTotal;

const lb=D.leaderboard;
const podium=document.getElementById('podium');
[1,0,2].forEach(i=>{ // visual order 2-1-3
  const p=lb[i]; if(!p)return;
  const d=document.createElement('div'); d.className='pod p'+(i+1);
  d.innerHTML=`<div class="medal">${i+1}</div><div class="nm">${p.name}</div>
    <div class="st">${p.in?'<span class="live-dot"></span>':''}${p.bestStageLabel}</div>`;
  podium.appendChild(d);
});
document.getElementById('board').innerHTML=lb.slice(3).map((p,i)=>`
  <div class="row ${p.in?'in':'out'}">
    <div class="rk">${i+4}</div>
    <div class="who"><b>${p.name}</b><div class="teams">${p.teams.map(t=>t.display).join(' · ')}</div></div>
    <span class="badge ${p.in?'b-in':'b-out'}">${p.in?'IN':p.bestStageLabel}</span>
  </div>`).join('');

document.getElementById('recent').innerHTML=D.recent.map(r=>`
  <div class="res">
    <div class="stg">${r.stage}</div>
    <div class="tm r">${r.home.name} ${crest(r.home,20)}</div>
    <div class="sc">${r.hs}–${r.as}</div>
    <div class="tm">${crest(r.away,20)} ${r.away.name}</div>
  </div>`).join('');

document.getElementById('fixtures').innerHTML=D.fixtures.map(f=>`
  <div class="res">
    <div class="stg">${f.stage}</div>
    <div class="tm r">${f.home.name} ${crest(f.home,20)}</div>
    <div class="sc">${f.time}</div>
    <div class="tm">${crest(f.away,20)} ${f.away.name}</div>
  </div>`).join('');

document.getElementById('players').innerHTML=D.players.map(p=>`
  <div class="pcard">
    <div class="ph"><b>${p.name}</b><span class="badge ${p.in?'b-in':'b-out'}">${p.in?'IN':'OUT'}</span></div>
    <div class="chips">${p.teams.map(t=>`
      <span class="chip ${t.in?'alive':(t.matched?'dead':'')}">${crest(t,16)}${t.display}
        <small>${t.matched?t.stageLabel:'?'}</small></span>`).join('')}</div>
  </div>`).join('');

document.getElementById('flags').innerHTML='<h2>Data notes to confirm</h2>'+
  Object.entries(D.flags).map(([k,v])=>`<div><b>${k}</b> — ${v}</div>`).join('');
</script>
</body>
</html>
