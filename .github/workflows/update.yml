name: Update WC sweep data

# Refreshes data.js from football-data.org and commits it.
# Requires a repo secret named FOOTBALL_DATA_KEY (Settings -> Secrets and variables -> Actions).
# Pair with GitHub Pages (Settings -> Pages -> deploy from branch) to host the page for free.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: wc-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate data.js
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python update.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.js; then
            git add data.js
            git commit -m "chore: refresh WC sweep data"
            git push
          else
            echo "No data change."
          fi
