<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC26 Sweep · Design 4 · Scoreboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@500;700&display=swap');
  :root{--bg:#101010;--panel:#181818;--line:#2c2c2c;--ink:#fff;--mut:#9a9a9a;
        --orange:#ff6a00;--yellow:#ffd200;--green:#39d353;--red:#ff3b3b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Oswald",system-ui,sans-serif;background:
      repeating-linear-gradient(180deg,#0e0e0e 0 2px,#121212 2px 4px),var(--bg);color:var(--ink);min-height:100vh}
  .wrap{max-width:1200px;margin:0 auto;padding:24px 20px 70px}
  header{border:3px solid var(--orange);border-radius:8px;background:var(--panel);padding:16px 22px;
         display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
         box-shadow:0 0 0 4px #000 inset}
  h1{font-family:"Bebas Neue",sans-serif;font-size:46px;letter-spacing:2px;line-height:.9;color:var(--yellow)}
  .sub{color:var(--mut);font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .demo{font-family:"Bebas Neue";letter-spacing:2px;background:var(--red);color:#fff;padding:3px 12px;border-radius:4px;font-size:15px}
  .leds{display:flex;gap:14px}
  .led{background:#000;border:2px solid var(--line);border-radius:6px;padding:8px 16px;text-align:center;min-width:90px}
  .led b{font-family:"Bebas Neue";font-size:38px;line-height:.9;color:var(--green);display:block;
         text-shadow:0 0 12px rgba(57,211,83,.6)}
  .led span{font-size:10px;letter-spacing:1.5px;color:var(--mut)}
  h2{font-family:"Bebas Neue";font-size:26px;letter-spacing:2px;color:var(--orange);margin:28px 0 12px;
     border-bottom:2px solid var(--line);padding-bottom:6px;display:flex;justify-content:space-between;align-items:end}
  /* leaderboard list */
  .lrow{display:grid;grid-template-columns:54px 1fr auto;align-items:center;gap:12px;background:var(--panel);
        border:2px solid var(--line);border-left-width:6px;border-radius:6px;padding:12px 16px;margin-bottom:7px}
  .lrow.in{border-left-color:var(--green)}
  .lrow.out{border-left-color:#444;opacity:.65}
  .lrow .pos{font-family:"Bebas Neue";font-size:34px;color:var(--yellow);text-align:center;line-height:1}
  .lrow .nm{font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .lrow .tl{font-size:12px;color:var(--mut);text-transform:uppercase}
  .tag{font-family:"Bebas Neue";letter-spacing:1.5px;font-size:18px;padding:3px 14px;border-radius:4px}
  .tag.in{background:var(--green);color:#000}
  .tag.out{background:#000;color:var(--mut);border:1px solid var(--line)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  /* scoreboard match */
  .match{background:var(--panel);border:2px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:9px;
         display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
  .match .stg{grid-column:1/-1;font-size:11px;letter-spacing:1.5px;color:var(--orange);text-transform:uppercase}
  .side{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:500}
  .side.r{justify-content:flex-end}
  .side img{width:26px;height:26px;object-fit:contain}
  .score{font-family:"Bebas Neue";font-size:30px;background:#000;border:2px solid var(--line);border-radius:5px;
         padding:2px 14px;color:var(--yellow);letter-spacing:2px}
  .score.t{color:var(--green);font-size:18px;padding:8px 12px}
  /* players */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .pc{background:var(--panel);border:2px solid var(--line);border-radius:6px;padding:12px}
  .pc.in{border-color:var(--green)}
  .pc .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .pc .h b{font-size:18px;text-transform:uppercase;letter-spacing:.5px}
  .tchip{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:4px 9px;border:1px solid var(--line);
         border-radius:4px;margin:3px 3px 0 0;background:#000}
  .tchip.alive{border-color:var(--green);color:var(--green)}
  .tchip.dead{opacity:.5;text-decoration:line-through}
  .tchip img{width:16px;height:16px;object-fit:contain}
  .flags{font-size:13px;color:var(--mut);margin-top:6px}
  .flags b{color:var(--yellow)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="title"></h1>
      <div class="sub" id="sub"></div>
    </div>
    <div style="display:flex;gap:14px;align-items:center">
      <span class="demo">DEMO</span>
      <div class="led"><b id="pin"></b><span>STILL IN</span></div>
      <div class="led"><b id="ptot"></b><span>PLAYERS</span></div>
    </div>
  </header>

  <h2>League Table <span class="sub">Last team standing</span></h2>
  <div id="board"></div>

  <div class="cols">
    <div>
      <h2>Latest Scores</h2>
      <div id="recent"></div>
      <h2>Coming Up</h2>
      <div id="fixtures"></div>
    </div>
    <div>
      <h2>Squads</h2>
      <div class="pgrid" id="players"></div>
      <h2>Check These</h2>
      <div id="flags"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
const D=window.DATA;
const cr=(t,s=24)=>t.crest?`<img src="${t.crest}" width="${s}" height="${s}" onerror="this.style.display='none'">`:'';
title.textContent=D.title;
sub.textContent=D.phase+' — updated '+new Date(D.updated).toLocaleString();
pin.textContent=D.playersIn; ptot.textContent=D.playersTotal;

board.innerHTML=D.leaderboard.map((p,i)=>`
  <div class="lrow ${p.in?'in':'out'}">
    <div class="pos">${i+1}</div>
    <div><div class="nm">${p.name}</div><div class="tl">${p.teams.map(t=>t.display).join(' · ')} — best: ${p.bestStageLabel}</div></div>
    <span class="tag ${p.in?'in':'out'}">${p.in?'IN':'OUT'}</span>
  </div>`).join('');

recent.innerHTML=D.recent.map(r=>`
  <div class="match"><div class="stg">${r.stage} · ${r.note}</div>
    <div class="side r">${r.home.name} ${cr(r.home)}</div>
    <div class="score">${r.hs}-${r.as}</div>
    <div class="side">${cr(r.away)} ${r.away.name}</div></div>`).join('');

fixtures.innerHTML=D.fixtures.map(f=>`
  <div class="match"><div class="stg">${f.stage} · ${f.date}</div>
    <div class="side r">${f.home.name} ${cr(f.home)}</div>
    <div class="score t">${f.time}</div>
    <div class="side">${cr(f.away)} ${f.away.name}</div></div>`).join('');

players.innerHTML=D.players.map(p=>`
  <div class="pc ${p.in?'in':''}">
    <div class="h"><b>${p.name}</b><span class="tag ${p.in?'in':'out'}">${p.in?'IN':'OUT'}</span></div>
    <div>${p.teams.map(t=>`<span class="tchip ${t.in?'alive':(t.matched?'dead':'')}">${cr(t,16)}${t.display}</span>`).join('')}</div>
  </div>`).join('');

flags.innerHTML=Object.entries(D.flags).map(([k,v])=>`<div class="flags"><b>${k}</b> — ${v}</div>`).join('');
</script>
</body>
</html>
