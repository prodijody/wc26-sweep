<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC26 Sweep · Design 2 · Clean Light</title>
<style>
  :root{--bg:#f4f6fb;--card:#fff;--ink:#1a2233;--mut:#6b7488;--line:#e6e9f2;
        --blue:#2f6df6;--blue2:#eaf1ff;--green:#10b981;--greenbg:#e7f8f1;--red:#ef4444;--amber:#f59e0b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 70px}
  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:24px}
  h1{font-size:28px;font-weight:800;letter-spacing:-.6px}
  .sub{color:var(--mut);font-size:14px;margin-top:4px}
  .demo{background:#fff4e5;color:var(--amber);border:1px solid #ffe2b8;padding:4px 11px;border-radius:8px;font-size:12px;font-weight:700}
  .stats{display:flex;gap:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 18px;text-align:center;box-shadow:0 1px 2px rgba(20,30,60,.04)}
  .stat b{display:block;font-size:24px;color:var(--blue)}
  .stat span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
  .cols{display:grid;grid-template-columns:1.5fr 1fr;gap:20px}
  @media(max-width:880px){.cols{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(20,30,60,.05);margin-bottom:20px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin-bottom:14px;font-weight:700}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);padding:0 10px 10px;font-weight:600}
  td{padding:11px 10px;border-top:1px solid var(--line);font-size:14px;vertical-align:middle}
  tr.out td{color:var(--mut)}
  tr.out .nm{text-decoration:line-through}
  .rk{font-weight:800;color:var(--mut);width:30px}
  .rk.top{color:var(--blue)}
  .nm{font-weight:700}
  .teamline{font-size:12px;color:var(--mut);margin-top:2px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
  .pill.in{background:var(--greenbg);color:var(--green)}
  .pill.out{background:#f1f3f8;color:var(--mut)}
  .crest{vertical-align:middle;border-radius:3px;object-fit:contain}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .pcard{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fcfdff}
  .pcard.in{border-color:#bdebd6;background:var(--greenbg)}
  .pcard .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .pcard .top b{font-size:15px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:9px;font-size:13px;
        background:#fff;border:1px solid var(--line);margin:3px 3px 0 0}
  .chip.alive{border-color:var(--green);background:var(--greenbg);font-weight:600}
  .chip.dead{opacity:.55;text-decoration:line-through}
  .chip small{color:var(--mut);font-size:10px}
  .res{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .res:last-child{border:0}
  .res .stg{width:80px;font-size:11px;color:var(--mut);text-transform:uppercase;flex:none}
  .res .tm{flex:1;display:flex;align-items:center;gap:6px}
  .res .tm.r{justify-content:flex-end;text-align:right}
  .res .sc{font-weight:800;background:#f1f3f8;border-radius:7px;padding:3px 9px;min-width:50px;text-align:center}
  .res .sc.t{background:var(--blue2);color:var(--blue)}
  .note{font-size:12px;color:var(--mut);margin-top:8px}
  .note b{color:var(--amber)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div style="display:flex;align-items:center;gap:10px"><h1 id="title"></h1><span class="demo">DEMO DATA</span></div>
      <div class="sub" id="sub"></div>
    </div>
    <div class="stats">
      <div class="stat"><b id="pin"></b><span>Still in</span></div>
      <div class="stat"><b id="ptot"></b><span>Players</span></div>
    </div>
  </header>

  <div class="cols">
    <div>
      <div class="card">
        <h2>Leaderboard</h2>
        <table>
          <thead><tr><th>#</th><th>Player</th><th>Furthest stage</th><th>Teams left</th><th>Status</th></tr></thead>
          <tbody id="board"></tbody>
        </table>
      </div>
      <div class="card">
        <h2>All players &amp; teams</h2>
        <div class="pgrid" id="players"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <h2>Recent results</h2>
        <div id="recent"></div>
      </div>
      <div class="card">
        <h2>Still to play</h2>
        <div id="fixtures"></div>
      </div>
      <div class="card">
        <h2>Data to confirm</h2>
        <div id="flags"></div>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
const D=window.DATA;
const crest=(t,s=18)=>t.crest?`<img class="crest" src="${t.crest}" width="${s}" height="${s}" onerror="this.style.display='none'"> `:'';
title.textContent=D.title;
sub.textContent='Last team standing · '+D.phase+' · updated '+new Date(D.updated).toLocaleString();
pin.textContent=D.playersIn; ptot.textContent=D.playersTotal;

board.innerHTML=D.leaderboard.map((p,i)=>`
  <tr class="${p.in?'in':'out'}">
    <td class="rk ${i<3?'top':''}">${i+1}</td>
    <td><div class="nm">${p.name}</div><div class="teamline">${p.teams.map(t=>t.display).join(', ')}</div></td>
    <td>${p.bestStageLabel}</td>
    <td>${p.aliveCount}</td>
    <td><span class="pill ${p.in?'in':'out'}">${p.in?'In':'Out'}</span></td>
  </tr>`).join('');

players.innerHTML=D.players.map(p=>`
  <div class="pcard ${p.in?'in':''}">
    <div class="top"><b>${p.name}</b><span class="pill ${p.in?'in':'out'}">${p.in?'In':'Out'}</span></div>
    <div>${p.teams.map(t=>`<span class="chip ${t.in?'alive':(t.matched?'dead':'')}">${crest(t,15)}${t.display} <small>${t.matched?t.stageLabel:'?'}</small></span>`).join('')}</div>
  </div>`).join('');

recent.innerHTML=D.recent.map(r=>`
  <div class="res"><div class="stg">${r.stage}</div>
    <div class="tm r">${r.home.name} ${crest(r.home,18)}</div>
    <div class="sc">${r.hs}–${r.as}</div>
    <div class="tm">${crest(r.away,18)} ${r.away.name}</div></div>`).join('');

fixtures.innerHTML=D.fixtures.map(f=>`
  <div class="res"><div class="stg">${f.stage}</div>
    <div class="tm r">${f.home.name} ${crest(f.home,18)}</div>
    <div class="sc t">${f.time}</div>
    <div class="tm">${crest(f.away,18)} ${f.away.name}</div></div>`).join('');

flags.innerHTML=Object.entries(D.flags).map(([k,v])=>`<div class="note"><b>${k}</b> — ${v}</div>`).join('');
</script>
</body>
</html>
